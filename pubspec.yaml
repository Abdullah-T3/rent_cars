name: rental_app
description: "rent_cars app"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  calendar_date_picker2: ^1.1.7
  cloudinary: ^1.2.0
  cloudinary_public: ^0.23.1
  cupertino_icons: ^1.0.8
  device_preview: ^1.2.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.2
  image_picker: ^0.8.7+3
  intl: ^0.19.0
  path_provider: ^2.1.4
  provider: ^6.1.2
  redacted: ^1.0.12
  shared_preferences: ^2.3.2

dev_dependencies:
  build_runner: ^2.4.12
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env

flutter_intl:
  enabled: true
